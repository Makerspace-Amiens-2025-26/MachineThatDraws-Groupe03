<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrôleur Manuel CNC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="panel">
        <h2>Contrôle Manuel</h2>
        
        <div class="status-box">
            <div>Statut : <span id="status">Déconnecté</span></div>
        </div>
        <button id="btnConnect" class="conn-btn">🔌 CONNECTER USB</button>

        <div class="settings">
            <label>Distance par appui (mm) :</label>
            <input type="number" id="stepDistance" value="10" min="0.1" step="0.1">

            <label>Vitesse de déplacement (mm/min) :</label>
            <!-- VITESSE PASSÉE À 1000 ICI -->
            <input type="number" id="jogSpeed" value="1000" min="100" step="100">
        </div>

        <div class="dpad">
            <div class="row">
                <button id="btnUp" class="dir-btn" title="Flèche Haut">⬆️ Y+</button>
            </div>
            <div class="row">
                <button id="btnLeft" class="dir-btn" title="Flèche Gauche">⬅️ X-</button>
                <button id="btnHome" class="action-btn">🏠 Origine</button>
                <button id="btnRight" class="dir-btn" title="Flèche Droite">➡️ X+</button>
            </div>
            <div class="row">
                <button id="btnDown" class="dir-btn" title="Flèche Bas">⬇️ Y-</button>
            </div>
            <div class="row" style="margin-top: 10px;">
                <button id="btnPen" class="pen-btn" title="Appuyez sur Espace">🖊️ Stylo : LEVÉ (Espace)</button>
            </div>
        </div>
        
        <p class="hint">⌨️ Astuces : <br><strong>Flèches</strong> = Déplacements | <strong>Espace</strong> = Stylo</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
