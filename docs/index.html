<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test MachineThatDraws</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #34495e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Test</h1>
        <p>TEST</p>
        <button id="btn">Test JS</button>
        <p id="msg"></p>
    </div>

    <script>
        document.getElementById('btn').addEventListener('click', () => {
            document.getElementById('msg').innerText = "JS fonctionne";
        });
    </script>
</body>
</html>
