<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Doc | Fabrication PCB</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="nav-placeholder"></div>
    <main class="content">
        <section id="fab-pcb">
            <h1>Fabrication et soudure</h1>
            <p>En cour</p>

                <div class="model-window" style="width: 100%; height: 500px; background: #1a1a1a; border: 1px solid #111; border-top: 2px solid #ff003c; border-radius: 5px; overflow: hidden; margin: 30px 0; display: flex; flex-direction: column;">
                <model-viewer 
                    src="Model/PCB-MTD2.glb" 
                    camera-controls 
                    auto-rotate
                    shadow-intensity="1"
                    orientation="deg 50deg 0deg" 
                    exposure="0.3"
                    tone-mapping="commerce"        
                    shadow-intensity="2"
                    shadow-softness="1"
                    style="width: 100%; flex-grow: 1; background-color: #222;">
                    <div slot="poster" style="display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; color: #ff003c; font-family: 'Orbitron', sans-serif; background: #050505; text-align: center;">
                        <div style="font-size: 1.2rem; margin-bottom: 10px; letter-spacing: 2px;">📡 LIAISON ÉTABLIE</div>
                        <div style="font-size: 0.9rem; color: #888;">CHARGEMENT DU MODÈLE 3D...</div>
                        <div style="width: 150px; height: 2px; background: #333; margin-top: 15px; position: relative; overflow: hidden;">
                            <div class="anim-scanline" style="width: 50px; height: 100%; background: #ff003c; position: absolute;"></div>
                        </div>
                    </div>
                </model-viewer>
                <div class="model-caption" style="background: #111; border-top: 1px solid #222; font-size: 0.9em; color: #888; padding: 12px; font-family: 'Rajdhani', sans-serif; text-align: center; letter-spacing: 1px;">
                    ▶ Modèle 3D interactif du PCB
                </div>
            </div>

        </section>
    </main>

    <script src="script.js"></script>
    <script src="menu.js"></script>
    <script type="module" src="Include/model-viewer.min.js"></script>
</body>
</html>
